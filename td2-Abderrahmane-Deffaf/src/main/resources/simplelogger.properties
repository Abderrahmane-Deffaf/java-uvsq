# Configuration pour SLF4J Simple
# Format: [LEVEL] [timestamp] [thread] [logger] - message

# Niveau de logging (TRACE, DEBUG, INFO, WARN, ERROR)
org.slf4j.simpleLogger.defaultLogLevel=INFO

# Format du timestamp
org.slf4j.simpleLogger.dateTimeFormat=yyyy-MM-dd HH:mm:ss

# Afficher le nom du thread
org.slf4j.simpleLogger.showThreadName=false

# Afficher le nom du logger
org.slf4j.simpleLogger.showLogName=false

# Afficher le nom court du logger
org.slf4j.simpleLogger.showShortLogName=true

# Niveau pour la classe Main spécifiquement
org.slf4j.simpleLogger.log.fr.uvsq.cprog.mvnjunit.Main=INFO